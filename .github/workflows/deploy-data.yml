name: Deploy data-service

on:
  push:
    branches: [main]
    paths:
      - 'data-service/**'
      - 'common/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build data-service
        run: mvn -pl common,data-service -am clean package -DskipTests

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          source: data-service/target/data-service-*.jar
          target: /opt/apps/data-service/
          strip_components: 2

      - name: Restart data-service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/apps/data-service
            mv data-service-*.jar data-service.jar 2>/dev/null || true
            systemctl restart data-service
            sleep 3
            systemctl is-active data-service && echo "✅ data-service 启动成功" || echo "❌ 启动失败"
