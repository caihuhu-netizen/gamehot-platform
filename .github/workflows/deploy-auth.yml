name: Deploy auth-service

on:
  push:
    branches: [main]
    paths:
      - 'auth-service/**'
      - 'common/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build auth-service
        run: mvn -pl common,auth-service -am clean package -DskipTests

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          source: auth-service/target/auth-service-*.jar
          target: /opt/apps/auth-service/
          strip_components: 2

      - name: Restart auth-service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/apps/auth-service
            mv auth-service-*.jar auth-service.jar 2>/dev/null || true
            systemctl restart auth-service
            sleep 3
            systemctl is-active auth-service && echo "✅ auth-service 启动成功" || echo "❌ 启动失败"
