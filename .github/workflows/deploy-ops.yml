name: Deploy ops-service

on:
  push:
    branches: [main]
    paths:
      - 'ops-service/**'
      - 'common/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ops-service
        run: mvn -pl common,ops-service -am clean package -DskipTests

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          source: ops-service/target/ops-service-*.jar
          target: /opt/apps/ops-service/
          strip_components: 2

      - name: Restart ops-service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/apps/ops-service
            mv ops-service-*.jar ops-service.jar 2>/dev/null || true
            systemctl restart ops-service
            sleep 3
            systemctl is-active ops-service && echo "✅ ops-service 启动成功" || echo "❌ 启动失败"
