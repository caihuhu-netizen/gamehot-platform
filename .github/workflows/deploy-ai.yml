name: Deploy ai-service

on:
  push:
    branches: [main]
    paths:
      - 'ai-service/**'
      - 'common/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ai-service
        run: mvn -pl common,ai-service -am clean package -DskipTests

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          source: ai-service/target/ai-service-*.jar
          target: /opt/apps/ai-service/
          strip_components: 2

      - name: Restart ai-service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 8.210.161.159
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/apps/ai-service
            mv ai-service-*.jar ai-service.jar 2>/dev/null || true
            systemctl restart ai-service
            sleep 3
            systemctl is-active ai-service && echo "✅ ai-service 启动成功" || echo "❌ 启动失败"
